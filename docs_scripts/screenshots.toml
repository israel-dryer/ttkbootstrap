# Screenshot manifest for ttkbootstrap docs.
#
# Each [[shots]] entry produces one PNG per requested theme at:
#   docs/assets/<theme>/<slug>.png
#
# Render via:
#   python -m docs_scripts.render
#   python -m docs_scripts.render --slug <slug>
#   python -m docs_scripts.render --page widgets/actions/button.md
#
# Fields:
#   slug    - filename stem; must be unique across the manifest.
#   page    - docs page that references this image; used by the 6D CI check.
#   factory - "module:attr" pointing at a callable(app) -> Widget. The
#             returned widget's bounding box is captured.
#   themes  - which theme variants to render; default ["light", "dark"].
#             Use ["light"] (or similar) only for genuinely theme-agnostic
#             assets such as logos.
#   padding - px around the returned widget; default 16.

[[shots]]
slug = "widgets-button-solid"
page = "widgets/actions/button.md"
factory = "docs_scripts.shots.button:solid"

[[shots]]
slug = "widgets-button-outline"
page = "widgets/actions/button.md"
factory = "docs_scripts.shots.button:outline"

